# Pipeline Services (Microservices)
# Run: docker-compose -f docker-compose.yml -f docker-compose.pipeline.yml up -d
# Or: docker-compose -f docker-compose.pipeline.yml up -d (requires postgres/redis running)

x-service-common: &service-common
  build:
    context: .
    dockerfile: Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    - DATABASE_URL=postgresql://user:password@postgres:5432/jobscout
    - REDIS_URL=redis://:${REDIS_PASSWORD:-jobscoutredis}@redis:6379/0
  env_file:
    - .env
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobscout
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d jobscout" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-jobscoutredis}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-jobscoutredis}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-jobscoutredis}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  extraction:
    <<: *service-common
    ports:
      - "8081:8081"
    command: [ "python", "-m", "uvicorn", "services.extraction.main:app", "--host", "0.0.0.0", "--port", "8081" ]

  embeddings:
    <<: *service-common
    ports:
      - "8082:8082"
    command: [ "python", "-m", "uvicorn", "services.embeddings.main:app", "--host", "0.0.0.0", "--port", "8082" ]

  scorer-matcher:
    <<: *service-common
    ports:
      - "8083:8083"
    command: [ "python", "-m", "uvicorn", "services.scorer_matcher.main:app", "--host", "0.0.0.0", "--port", "8083" ]

  orchestrator:
    <<: *service-common
    ports:
      - "8084:8084"
    command: [ "python", "-m", "uvicorn", "services.orchestrator.main:app", "--host", "0.0.0.0", "--port", "8084" ]

volumes:
  postgres_data:
  redis_data:
