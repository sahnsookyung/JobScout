# Pipeline Microservices
# Run: docker compose -f docker-compose.yml -f docker-compose.microservices.yml -f docker-compose.web.yml --profile web up -d
#
# This file contains all pipeline microservices (extraction, embeddings, scorer-matcher, orchestrator).
# It depends on docker-compose.yml which includes docker-compose.base.yml for infrastructure.
# Microservices have no profile restriction, but --profile web is still required to activate
# db-migrate (which all microservices depend on via condition: service_completed_successfully).

x-service-common: &service-common
  depends_on:
    db-migrate:
      condition: service_completed_successfully
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-jobscout}
    - REDIS_URL=redis://:${REDIS_PASSWORD:-jobscoutredis}@redis:6379/0
    - SMTP_SERVER=mailpit
    - SMTP_PORT=1025
    - SMTP_USE_TLS=false
    - FROM_EMAIL=noreply@jobscout.local
    - PYTHONUNBUFFERED=1
  env_file:
    - .env
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

include:
  - path: docker-compose.base.yml
    include_as: base

services:
  extraction:
    <<: *service-common
    build:
      context: .
      dockerfile: services/extraction/Dockerfile
    ports:
      - "${EXTRACTION_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - resume_uploads:/data/resume_uploads

  embeddings:
    <<: *service-common
    build:
      context: .
      dockerfile: services/embeddings/Dockerfile
    ports:
      - "${EMBEDDINGS_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # One-shot init container: downloads the cross-encoder model into the
  # scorer_models named volume before scorer-matcher starts, so the matcher's
  # boot-time warm_up() finds weights already on disk instead of timing out
  # liveness during a cold download. HF_TOKEN is consumed here (if needed by
  # the repo) and NOT by scorer-matcher at runtime.
  scorer-model-bootstrap:
    build:
      context: .
      dockerfile: services/scorer_matcher/Dockerfile
    env_file:
      - .env
    environment:
      - HF_HOME=/home/appuser/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/home/appuser/.cache/huggingface
      - SCORER_MODEL=${SCORER_MODEL:-BAAI/bge-reranker-v2-m3}
      - PYTHONUNBUFFERED=1
    volumes:
      - scorer_models:/home/appuser/.cache/huggingface
    command:
      - python
      - -c
      - |
        import os, sys
        from huggingface_hub import snapshot_download
        model = os.environ.get('SCORER_MODEL', 'BAAI/bge-reranker-v2-m3')
        token = os.environ.get('HF_TOKEN') or None
        cache_dir = os.environ['HF_HOME']
        print(f'[bootstrap] populating HF cache at {cache_dir} for {model}', flush=True)
        path = snapshot_download(repo_id=model, cache_dir=cache_dir, token=token)
        print(f'[bootstrap] model ready at {path}', flush=True)
    restart: "no"

  scorer-matcher:
    <<: *service-common
    build:
      context: .
      dockerfile: services/scorer_matcher/Dockerfile
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scorer-model-bootstrap:
        condition: service_completed_successfully
    volumes:
      - scorer_models:/home/appuser/.cache/huggingface
    ports:
      - "${SCORER_MATCHER_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  notification-worker:
    <<: *service-common
    build:
      context: .
      dockerfile: services/notification_worker/Dockerfile

  orchestrator:
    <<: *service-common
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-8084}:8084"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-jobscout}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-jobscoutredis}@redis:6379/0
      - PYTHONUNBUFFERED=1
      - JOBSPY_URL=http://jobspy:8000
      - EXTRACTION_URL=http://extraction:8081
      - EMBEDDINGS_URL=http://embeddings:8082
      - SCRAPER_INTERVAL_HOURS=${SCRAPER_INTERVAL_HOURS:-6}
    volumes:
      - resume_uploads:/data/resume_uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8084/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  resume_uploads:
  scorer_models:
