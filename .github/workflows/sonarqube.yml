name: SonarQube Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC to catch regressions
    - cron: '0 2 * * *'

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Install uv
        uses: astral-sh/setup-uv@15b87e6b42ed266142ae47e06235f5e80b9a2c38
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@0b93645e92b6e5ae5e3e9e01ad7071f0eb18f16d
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          # Run all tests with coverage
          # Redis is available on localhost:6379 from GitHub Actions service
          uv run pytest tests/ \
            --cov=services \
            --cov=core \
            --cov=database \
            --cov=etl \
            --cov=pipeline \
            --cov=notification \
            --cov=web \
            --cov=modal \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term \
            -v --tb=short \
            --ignore=tests/integration/test_full_pipeline.py \
            --ignore=tests/integration/test_etl_real_data.py \
            --ignore=tests/integration/test_openai_schema_validation.py \
            --ignore=tests/integration/test_resume_schema.py \
            --ignore=tests/integration/test_user_wants_pipeline.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          REDIS_URL: redis://localhost:6379/1

      - name: Verify coverage file exists
        run: |
          ls -la coverage.xml
          ls -la htmlcov/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7819713a3a77872d61c353cb89b93758184688f7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65c4c2f01240a26b6734856e5c3a001b8c136381
        with:
          name: test-results
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7
