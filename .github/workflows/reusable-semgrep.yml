# ── Reusable — Semgrep SAST ───────────────────────────────────────────────────
# Shared core component (policy §27). Replaces opengrep as CLI-first SAST tool.
# Callers MUST declare explicit permissions in the calling job (policy §9.4).
# No secrets: inherit (policy §9.7). No environment binding (policy §27.6).
# Policy references: §7 (CLI-first), §12.1, §15.5, §16, §18.3.
#
# Binary integrity: semgrep wheel verified by SHA256 (policy §12.1).
# Rules: pinned to semgrep/semgrep-rules commit SHA (policy §18.3).
#   Rules SHA: b3409178ba39fe6a45801bb59f3e99ff7bd281ca (2026-03-30)
#   Update rules SHA quarterly or when security-relevant rule updates land.
# ─────────────────────────────────────────────────────────────────────────────

name: "Reusable — Semgrep"

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        description: "Days to retain the SARIF evidence artifact"
        required: true
        type: number

permissions: {}

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write  # upload SARIF to GitHub Security tab
      actions: read           # required by codeql-action/upload-sarif on private repos

    steps:
      - name: Checkout
        # actions/checkout v4.2.2 — verified 2026-03-30
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install semgrep from pinned wheel
        # Wheel SHA256 verified before install (policy §12.1).
        # Version: semgrep 1.156.0. PyPI wheel for manylinux2014 x86_64.
        # NOTE: version not covered by Dependabot (inline shell variable).
        #   Update manually and re-verify SHA256 quarterly (policy §31.3).
        # NOTE: transitive dependencies are resolved by pip at install time and
        # are not individually hash-verified. Full hash verification requires a
        # pip-compile lockfile (generate with: pip-compile --generate-hashes).
        run: |
          echo "::group::Download and verify semgrep wheel"
          SEMGREP_WHEEL="semgrep-1.156.0-cp310.cp311.cp312.cp313.cp314.py310.py311.py312.py313.py314-none-manylinux2014_x86_64.whl"
          SEMGREP_WHEEL_URL="https://files.pythonhosted.org/packages/92/0c/b00156bee40cf9e594c2bd10672232e33d9a7d1bc8b5a6dd697097c8d6be/${SEMGREP_WHEEL}"
          SEMGREP_EXPECTED_SHA256="a7f68544bcd33fac9bc519e6a6c4759d612836422ce87bc08dd014481c3e8fd0"
          curl -sSLo "${SEMGREP_WHEEL}" "${SEMGREP_WHEEL_URL}"
          echo "${SEMGREP_EXPECTED_SHA256}  ${SEMGREP_WHEEL}" | sha256sum -c
          echo "::endgroup::"

          echo "::group::Install semgrep"
          pip install --quiet "${SEMGREP_WHEEL}"
          semgrep --version
          echo "::endgroup::"

      - name: Fetch semgrep rules at pinned commit
        # Rules pinned to a specific commit SHA (policy §18.3).
        # Fetched as GitHub source archive — commit SHA is the integrity pin.
        # Update rules SHA quarterly or when security-relevant rule updates land.
        run: |
          echo "::group::Download semgrep rules archive"
          RULES_SHA="b3409178ba39fe6a45801bb59f3e99ff7bd281ca"
          curl -sSLo rules.tar.gz \
            "https://github.com/semgrep/semgrep-rules/archive/${RULES_SHA}.tar.gz"
          mkdir -p /tmp/semgrep-rules-src
          tar -xzf rules.tar.gz --strip-components=1 -C /tmp/semgrep-rules-src
          rm rules.tar.gz
          echo "::endgroup::"

          echo "::group::Locate python security rules directory"
          # Discover the python security rules directory — the archive layout can
          # shift between commits. Try specific paths in preference order so we
          # always scan the most focused ruleset available, failing loudly (not
          # silently with zero rules) if none match.
          RULES_DIR=""
          for candidate in \
            /tmp/semgrep-rules-src/python/security \
            /tmp/semgrep-rules-src/python \
            /tmp/semgrep-rules-src/rules/python/security \
            /tmp/semgrep-rules-src/rules/python; do
            if [ -d "$candidate" ]; then
              RULES_DIR="$candidate"
              echo "Semgrep rules directory: $RULES_DIR"
              break
            fi
          done
          if [ -z "$RULES_DIR" ]; then
            echo "::error::Could not locate semgrep python rules — top-level layout:"
            find /tmp/semgrep-rules-src -maxdepth 3 -type d | head -30
            exit 1
          fi
          echo "SEMGREP_RULES_DIR=${RULES_DIR}" >> "$GITHUB_ENV"
          echo "::endgroup::"

      - name: Run semgrep
        # always() ensures this step runs even when the rules-fetch step fails,
        # so semgrep.sarif always exists for the upload/filter steps below.
        if: always()
        # NOTE: --error is intentionally omitted here. The CI gate is applied after
        # filtering out known false-positive rule categories (best-practice,
        # maintainability) that produce noise for this codebase. The "Check for
        # security findings" step below is the actual blocking gate (policy §18.3).
        # --metrics=off: no data sent to semgrep.dev (policy §13.1 — trust boundary).
        run: |
          echo "### Semgrep SAST" >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$SEMGREP_RULES_DIR" ]; then
            echo "::error::SEMGREP_RULES_DIR not set — rules fetch failed; scan skipped"
            echo "- **Result: ERROR** — rules fetch failed, no scan performed" >> "$GITHUB_STEP_SUMMARY"
            # Write a minimal valid SARIF so upload steps have a file to work with.
            printf '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"semgrep"}},"results":[]}]}' > semgrep.sarif
            exit 1
          fi

          echo "::group::Run semgrep scan"
          semgrep \
            --config "$SEMGREP_RULES_DIR" \
            --sarif \
            --output semgrep.sarif \
            --no-autofix \
            --metrics=off \
            --timeout 60 \
            . || SEMGREP_SCAN_EXIT=$?
          echo "::endgroup::"

          # Fail on scan error (parse failure, timeout, etc.) but not on findings —
          # the finding gate runs after SARIF filtering below.
          if [ "${SEMGREP_SCAN_EXIT:-0}" -ne 0 ]; then
            echo "- **Result: ERROR** — scan failed (exit ${SEMGREP_SCAN_EXIT})" >> "$GITHUB_STEP_SUMMARY"
            exit "${SEMGREP_SCAN_EXIT}"
          fi

          echo "::group::Summarize raw findings"
          # Safe structured summary — no raw finding content (policy §15.4).
          RAW=$(python3 -c "import json; d=json.load(open('semgrep.sarif')); print(sum(len(r.get('results',[]))for r in d.get('runs',[])))" 2>/dev/null || echo "?")
          echo "- Raw findings (all rules): ${RAW}" >> "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Filter SARIF — drop non-actionable noise
        # Removes findings from rule categories that are informational or produce
        # false positives for this codebase. Uses substring matching so the filter
        # is robust against changes in the leading filesystem path that semgrep
        # embeds in rule IDs when loading from a local directory.
        #
        # Filtered categories:
        #   .lang.best-practice.      — arbitrary-sleep, logging-error-without-handling, etc.
        #   .lang.maintainability.    — is-function-without-parentheses, useless-inner-function, etc.
        #   .requests.best-practice.  — use-raise-for-status, use-timeout (fixed in code)
        #
        # Kept: all other security findings become the sole blocking gate.
        if: always()
        run: |
          echo "::group::Filter non-actionable SARIF findings"
          python3 - <<'PYEOF'
          import json, sys

          # Substring match — works regardless of the leading filesystem path that
          # semgrep prepends to rule IDs when using a local --config directory.
          NOISY_SUBSTRINGS = (
              ".lang.best-practice.",
              ".lang.maintainability.",
              ".requests.best-practice.",
          )

          try:
              with open("semgrep.sarif") as f:
                  sarif = json.load(f)
          except Exception as e:
              print(f"Warning: could not read semgrep.sarif: {e}", file=sys.stderr)
              sys.exit(0)

          total_before = 0
          total_after = 0
          for run in sarif.get("runs", []):
              before = run.get("results", [])
              total_before += len(before)
              run["results"] = [
                  r for r in before
                  if not any(s in r.get("ruleId", "") for s in NOISY_SUBSTRINGS)
              ]
              total_after += len(run["results"])

          filtered = total_before - total_after
          print(f"Filtered {filtered} noisy findings; {total_after} security findings remain")

          with open("semgrep.sarif", "w") as f:
              json.dump(sarif, f)
          PYEOF
          echo "::endgroup::"

      - name: Check for security findings
        # This is the CI gate (policy §18.3). Only security-category findings block
        # the build; best-practice/maintainability noise has been filtered above.
        if: always()
        run: |
          echo "::group::Evaluate security findings gate"
          FINDINGS=$(python3 -c "import json; d=json.load(open('semgrep.sarif')); print(sum(len(r.get('results',[]))for r in d.get('runs',[])))" 2>/dev/null || echo "0")
          echo "- Security findings (after filtering): ${FINDINGS}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${FINDINGS}" -gt 0 ]; then
            echo "- **Result: FAIL**" >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
            exit 1
          else
            echo "- **Result: PASS**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "::endgroup::"

      - name: Upload semgrep SARIF
        if: always()
        # actions/upload-artifact v4.6.2 — verified 2026-03-30
        # Explicit retention required (policy §15.5). Caller controls the value.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Upload SARIF to GitHub Security tab
        # github/codeql-action v3.28.13 — verified 2026-03-30 (same SHA as CodeQL steps).
        # Skipped on fork PRs: the GITHUB_TOKEN in that context lacks security-events:write.
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@1b549b9259bda1cb5ddde3b41741a82a2d15a841
        with:
          sarif_file: semgrep.sarif
          category: semgrep
