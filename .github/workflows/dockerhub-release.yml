# ── Publish Docker image to Docker Hub ───────────────────────────────────────
# Policy references: §9.2 (permissions: {}), §9.8 (persist-credentials: false),
#   §11.1 (SHA-pinned actions), §21 (concurrency + timeout),
#   §24 (release/publish boundary), §24.6 (release authority).
#
# Trigger: protected tags matching v* only (policy §24.2).
# id-token: write is granted at job level only, not workflow level (policy §9.12).
# Release evidence: artifacts are NOT produced here; Docker Hub provenance and
#   SBOM attestations serve as the release evidence (policy §24.5).
#
# docker/* action exception note (policy §7.1, §7.4, §29):
#   Four Docker-maintained actions are used for Docker Hub publishing:
#     docker/setup-buildx-action, docker/login-action,
#     docker/metadata-action, docker/build-push-action.
#   No direct-CLI path provides equivalent multi-platform build support,
#   SBOM generation, and provenance attestation within GitHub Actions.
#   Compensating controls: all four actions pinned to immutable commit SHAs;
#   provenance (mode=max) and SBOM attestations generated on every release.
#   Exception must be reviewed quarterly (policy §31.3).
#   SHAs verified 2026-03-30 — see per-step comments for individual SHAs.
# ─────────────────────────────────────────────────────────────────────────────

name: Publish Docker image to Docker Hub

on:
  push:
    tags:
      - "v*"

# Workflow-level default: deny all (policy §9.2).
permissions: {}

concurrency:
  group: dockerhub-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/jobscout

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Permissions granted at job level only (policy §9.3, §9.12).
    permissions:
      contents: read
      # id-token: write required for provenance attestations (policy §24.5).
      # Granted only here — not at workflow level (policy §9.12).
      id-token: write

    steps:
      - name: Checkout
        # actions/checkout v4.2.2 — verified 2026-03-30
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v3.10.0 — verified 2026-03-30
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to Docker Hub
        # docker/login-action v4.0.0 — verified 2026-03-30
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build date
        id: builddate
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags, labels)
        id: meta
        # docker/metadata-action v5.7.0 — verified 2026-03-30
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.IMAGE_NAME }}
          # Only tag "latest" for stable tags (no hyphen like -rc1)
          flavor: |
            latest=${{ !contains(github.ref_name, '-') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        # docker/build-push-action v6.17.0 — verified 2026-03-30
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # provenance and sbom generate attestations (policy §24.5).
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.builddate.outputs.date }}
