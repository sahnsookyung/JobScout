# ── Reusable — Checkov IaC scan ───────────────────────────────────────────────
# Shared core component (policy §27). Deprivileged context ONLY (policy §18.5).
# Callers MUST declare explicit permissions in the calling job (policy §9.4).
# No secrets: inherit (policy §9.7). No environment binding (policy §27.6).
# Policy references: §7 (CLI-first), §12.1, §15.5, §16, §18.5.
#
# MUST NOT receive secrets, deployment credentials, or write-scoped tokens
# when scanning untrusted IaC (policy §18.5). This workflow is deprivileged:
# permissions are read-only and no secrets are declared.
#
# Version: checkov 3.2.513 — verified 2026-03-30.
# NOTE: checkov has many transitive dependencies. Full hash verification
# requires a pip-compile lockfile. Version pinning is the zero-cost baseline.
# ─────────────────────────────────────────────────────────────────────────────

name: "Reusable — Checkov"

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        description: "Days to retain the SARIF evidence artifact"
        required: true
        type: number

permissions: {}

jobs:
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deprivileged: read-only access only (policy §18.5).
    # MUST NOT add secrets, write tokens, or deployment credentials to this job.
    permissions:
      contents: read
      security-events: write  # upload SARIF to GitHub Security tab
      actions: read           # required by codeql-action/upload-sarif on private repos

    steps:
      - name: Checkout
        # actions/checkout v4.2.2 — verified 2026-03-30
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install checkov
        # Pinned to exact version (policy §18.5: MUST run from pinned dependency definition).
        # NOTE: version not covered by Dependabot (inline shell variable).
        #   Update manually and re-verify quarterly (policy §31.3).
        run: |
          pip install --quiet "checkov==3.2.513"
          checkov --version

      - name: Run checkov — Dockerfile
        # --soft-fail is intentional: IaC findings are reported in the summary and
        # retained as SARIF evidence but do NOT fail the build by default.
        # To enforce hard failures, remove --soft-fail and document the exception
        # per policy §29 (define compensating controls and review date).
        run: |
          checkov \
            --framework dockerfile \
            --directory . \
            --output sarif \
            --output-file-path checkov-dockerfile.sarif \
            --soft-fail

          echo "### Checkov — Dockerfile" >> "$GITHUB_STEP_SUMMARY"
          if [ -f checkov-dockerfile.sarif ]; then
            FINDINGS=$(python3 -c "import json; d=json.load(open('checkov-dockerfile.sarif')); print(sum(len(r.get('results',[]))for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "- Dockerfile findings: ${FINDINGS} (informational — soft-fail)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run checkov — YAML (Docker Compose + other YAML)
        # --soft-fail is intentional (same rationale as Dockerfile step above).
        # NOTE: --framework docker_compose was removed in checkov v3; the yaml
        # framework covers docker-compose.yml and all other YAML in the tree.
        run: |
          checkov \
            --framework yaml \
            --directory . \
            --output sarif \
            --output-file-path checkov-yaml.sarif \
            --soft-fail

          echo "### Checkov — YAML (Docker Compose + other YAML)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f checkov-yaml.sarif ]; then
            FINDINGS=$(python3 -c "import json; d=json.load(open('checkov-yaml.sarif')); print(sum(len(r.get('results',[]))for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "- YAML findings: ${FINDINGS} (informational — soft-fail)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload checkov SARIF — Dockerfile
        if: always()
        # actions/upload-artifact v4.6.2 — verified 2026-03-30
        # Explicit retention required (policy §15.5). Caller controls the value.
        # Separate artifact per framework (policy §23 table: "Checkov SARIF per framework").
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: checkov-dockerfile-sarif
          path: checkov-dockerfile.sarif
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Upload checkov SARIF — YAML
        if: always()
        # actions/upload-artifact v4.6.2 — verified 2026-03-30
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: checkov-yaml-sarif
          path: checkov-yaml.sarif
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Upload SARIF to GitHub Security tab — Dockerfile
        # github/codeql-action v3.28.13 — verified 2026-03-30 (same SHA as CodeQL steps).
        # Skipped on fork PRs: the GITHUB_TOKEN in that context lacks security-events:write.
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@1b549b9259bda1cb5ddde3b41741a82a2d15a841
        with:
          sarif_file: checkov-dockerfile.sarif
          category: checkov-dockerfile

      - name: Upload SARIF to GitHub Security tab — YAML
        # github/codeql-action v3.28.13 — verified 2026-03-30 (same SHA as CodeQL steps).
        # Skipped on fork PRs: the GITHUB_TOKEN in that context lacks security-events:write.
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@1b549b9259bda1cb5ddde3b41741a82a2d15a841
        with:
          sarif_file: checkov-yaml.sarif
          category: checkov-yaml
