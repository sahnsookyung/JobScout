# ── Security — jobscout caller workflow ──────────────────────────────────────
# Invokes shared reusable security workflows and CodeQL (public-repo only).
# Policy references: §8.2 (required triggers), §9.2 (permissions: {}),
#   §19.5 (gate job), §25 (jobscout implementation), §27.3 (caller responsibility).
#
# Repository settings required (cannot be set via workflow files):
#   - Default GITHUB_TOKEN permissions: read-only (policy §9.1)
#   - Branch protection: main, develop — require this workflow's gate check (policy §19)
#   - Fork PR approval: require approval for all outside collaborators (policy §25.6)
#   - Actions policy: restrict to approved sources (policy §6.4)
# ─────────────────────────────────────────────────────────────────────────────

name: Security

on:
  # Required triggers for required-check workflows (policy §8.2).
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Weekly Monday 03:00 UTC — catch regressions in dependencies (policy §8.2)
    - cron: "0 3 * * 1"
  merge_group:

# Workflow-level default: deny all (policy §9.2).
permissions: {}

# Cancel superseded runs on the same ref (policy §21).
concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ── Compute context ───────────────────────────────────────────────────────
  # Derives retention days based on trigger so callers pass the correct value.
  # PR runs: 7 days. Protected-branch pushes: 14 days (policy §23 table).
  setup:
    name: Compute context
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    outputs:
      retention-days: ${{ steps.retention.outputs.days }}
    steps:
      - name: Compute artifact retention
        id: retention
        # PR runs: 7 days. Protected-branch push and scheduled runs: 14 days (policy §23 table).
        # Scheduled scans catch regressions independently of branch activity and are
        # treated at the protected-branch retention level (not the short PR level).
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && \
               ("$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/develop") ]] || \
             [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            echo "days=14" >> "$GITHUB_OUTPUT"
          else
            echo "days=7" >> "$GITHUB_OUTPUT"
          fi

  # ── Gitleaks — secret scanning ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks
    needs: setup
    uses: ./.github/workflows/reusable-gitleaks.yml
    # Caller MUST declare explicit permissions (policy §9.4).
    permissions:
      contents: read
      security-events: write  # propagated to reusable: upload SARIF to Security tab
      actions: read           # propagated to reusable: required by upload-sarif on private repos
    with:
      artifact-retention-days: ${{ fromJSON(needs.setup.outputs.retention-days) }}

  # ── Grype — dependency vulnerability scan ─────────────────────────────────
  grype:
    name: Grype
    needs: setup
    uses: ./.github/workflows/reusable-grype.yml
    permissions:
      contents: read
      security-events: write  # propagated to reusable: upload SARIF to Security tab
      actions: read           # propagated to reusable: required by upload-sarif on private repos
    with:
      artifact-retention-days: ${{ fromJSON(needs.setup.outputs.retention-days) }}
      fail-on-severity: "high"

  # ── CodeQL — GitHub-native code scanning (jobscout public repo only) ──────
  # Approved for jobscout per policy §17.2, §25.3.
  # github/codeql-action is an approved GitHub-native exception (policy §7.5).
  #
  # Matrix note: this job runs once per language. GitHub collapses all matrix
  # instances into a single needs.<job>.result — "failure" if any instance
  # fails, "success" only if all pass. The Security Gate checks this single
  # value and correctly gates on all languages without special-casing.
  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # Required for uploading SARIF to GitHub Security tab (public repo only).
      security-events: write
      # Required to fetch internal or private CodeQL packs.
      packages: read
      # Required by upload-sarif on private repositories.
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # 'actions' scans workflow files for expression injection and unsafe
        # pull_request_target patterns — valuable given this repo's CI surface.
        language: [actions, python, javascript-typescript]

    steps:
      - name: Checkout
        # actions/checkout v4.2.2 — verified 2026-03-30
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # github/codeql-action v4.36.0 — verified 2026-05-24
        # build-mode: none — all languages here are interpreted; no build step needed.
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        # github/codeql-action v4.36.0 — verified 2026-05-24
        # Unique category per language prevents ambiguous SARIF overwrite (policy §16).
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463
        with:
          category: "/language:${{ matrix.language }}"

  # ── Security Gate ─────────────────────────────────────────────────────────
  # Stable-name gate job required for required checks (policy §19.5).
  # Fails if any security job failed, was skipped, or was not triggered.
  # Register "Security Gate" as the required check name in branch protection.
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [gitleaks, grype, codeql]
    if: always()
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Evaluate security job results
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          GRYPE_RESULT:    ${{ needs.grype.result }}
          CODEQL_RESULT:   ${{ needs.codeql.result }}
        run: |
          FAILED=0
          declare -A RESULTS=(
            [gitleaks]="$GITLEAKS_RESULT"
            [grype]="$GRYPE_RESULT"
            [codeql]="$CODEQL_RESULT"
          )
          for job in gitleaks grype codeql; do
            result="${RESULTS[$job]}"
            if [[ "$result" != "success" ]]; then
              echo "::error::${job}: ${result} (expected: success)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more security jobs failed or were not triggered as expected."
            echo "All security jobs must succeed for this gate to pass (policy §19.5)."
            exit 1
          fi
          echo "All security jobs passed."
