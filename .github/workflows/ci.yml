name: CI

on:
  pull_request:
  push:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  determine-run-mode:
    name: Determine CI Mode
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run this workflow
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            const branch = context.ref.replace('refs/heads/', '');
            const alwaysRunPushBranches = new Set(['main', 'develop']);

            if (event === 'pull_request') {
              core.setOutput('should_run', 'true');
              core.setOutput('reason', 'pull_request');
              return;
            }

            if (event !== 'push') {
              core.setOutput('should_run', 'true');
              core.setOutput('reason', `non-push:${event}`);
              return;
            }

            if (alwaysRunPushBranches.has(branch)) {
              core.setOutput('should_run', 'true');
              core.setOutput('reason', `protected-branch:${branch}`);
              return;
            }

            const { owner, repo } = context.repo;
            const { data: openPulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 1,
            });

            if (openPulls.length > 0) {
              core.info(`Skipping push-triggered CI for ${branch} because an open PR already exists.`);
              core.setOutput('should_run', 'false');
              core.setOutput('reason', 'duplicate-push-with-open-pr');
              return;
            }

            core.setOutput('should_run', 'true');
            core.setOutput('reason', `push-no-open-pr:${branch}`);

  python-unit:
    name: Python Unit Tests
    needs: determine-run-mode
    if: needs.determine-run-mode.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Python unit tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "not db and not redis and not integration and not slow"

  frontend-unit:
    name: Frontend Tests
    needs: determine-run-mode
    if: needs.determine-run-mode.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: web/frontend
        env:
          CI: true
        run: npm run test -- --run

  integration:
    name: Integration Tests
    needs: determine-run-mode
    if: needs.determine-run-mode.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run CI-safe integration suite
        run: |
          uv run python -m pytest \
            tests/integration/test_full_pipeline.py \
            tests/integration/test_resume_pipeline_lifecycle.py \
            tests/integration/test_user_wants_pipeline.py \
            tests/integration/services/test_services_lifespan.py \
            -q
