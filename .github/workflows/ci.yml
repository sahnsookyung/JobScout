name: CI

on:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Python unit tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "not db and not redis and not integration and not slow"

  frontend-unit:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: web/frontend
        env:
          CI: true
        run: npm run test -- --run

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run CI-safe integration suite
        run: |
          uv run python -m pytest \
            tests/integration/test_full_pipeline.py \
            tests/integration/test_resume_pipeline_lifecycle.py \
            tests/integration/test_user_wants_pipeline.py \
            tests/integration/services/test_services_lifespan.py \
            -q

  e2e-resume-flow:
    name: E2E Resume Flow
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run split-stack resume flow E2E
        run: |
          uv run python -m pytest \
            tests/integration/test_split_stack_resume_flow.py \
            -q
