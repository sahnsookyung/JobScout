# ── CI — jobscout ─────────────────────────────────────────────────────────────
# Policy references: §9.2 (permissions: {}), §9.8 (persist-credentials: false),
#   §11.1 (SHA-pinned actions), §19.5 (gate job), §21 (concurrency + timeout).
#
# Repository settings required:
#   - Register "CI Gate" as the required check in branch protection (policy §19.3).
#   - Default GITHUB_TOKEN permissions: read-only (policy §9.1).
#
# astral-sh/setup-uv exception note (policy §7.1, §7.4, §29):
#   This action is published by Astral (third party, not GitHub-maintained).
#   It installs the uv CLI; no GitHub-maintained or direct-CLI equivalent
#   exists for this setup step within GitHub Actions.
#   Compensating controls: action pinned to immutable commit SHA; uv binary
#   version also explicitly pinned via the `version:` input.
#   Exception must be reviewed quarterly (policy §31.3).
#   Action SHA: 22695119d769bdb6f7032ad67b9bca0ef8c4a174 — verified 2026-03-30
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Weekly Monday 04:00 UTC — catch regressions in dependencies (policy §8.2)
    - cron: "0 4 * * 1"
  merge_group:

# Workflow-level default: deny all (policy §9.2).
permissions: {}

# Cancel superseded runs on the same ref (policy §21).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv v8.2.0 — verified 2026-06-21
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          version: "0.11.2"

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint database migration surface
        run: |
          uv run ruff check \
            database \
            tests/unit/database/test_bootstrap.py \
            tests/unit/database/test_migrate.py \
            tests/unit/test_migrations.py

      - name: Run Python unit tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "not db and not redis and not integration and not slow and not security and not concurrency and not performance"

  python-security-concurrency:
    name: Python Security and Concurrency Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv v8.2.0 — verified 2026-06-21
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          version: "0.11.2"

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run security and concurrency tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "security or concurrency"

  python-db-redis:
    name: Python DB and Redis Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv v8.2.0 — verified 2026-06-21
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          version: "0.11.2"

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run DB and Redis tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "(db or redis) and not e2e"

  python-performance:
    name: Python Bounded Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv v8.2.0 — verified 2026-06-21
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          version: "0.11.2"

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run bounded performance tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "performance"

  frontend-unit:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Node
        # actions/setup-node v4.4.0 — verified 2026-03-30
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          # Disable built-in npm cache on fork PRs to prevent cache poisoning
          # (policy §15.8/15.9). Trusted runs (same-repo PRs, push, schedule) get caching.
          # The outer gate is the "require approval for outside collaborators" UI setting
          # (policy §25.6); this condition adds defence-in-depth at the workflow level.
          cache: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'npm' || '' }}
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: web/frontend
        env:
          CI: true
        run: npm run test -- --run

      - name: Run frontend type-check
        working-directory: web/frontend
        run: npm run type-check

      - name: Run frontend lint
        working-directory: web/frontend
        run: npm run lint

      - name: Build production frontend
        working-directory: web/frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: web/frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke and accessibility tests
        working-directory: web/frontend
        run: npm run test:e2e

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv v8.2.0 — verified 2026-06-21
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          version: "0.11.2"

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run CI-safe integration suite
        run: |
          uv run python -m pytest \
            tests/integration/test_full_pipeline.py \
            tests/integration/test_resume_pipeline_lifecycle.py \
            tests/integration/test_user_wants_pipeline.py \
            tests/integration/services/test_services_lifespan.py \
            -q

      - name: Run schema snapshot parity
        run: |
          uv run python -m pytest \
            tests/integration/database/test_orm_schema_snapshot.py \
            -q

  docker-compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSPY_API_TOKEN: jobscout-ci-internal-token

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Ensure compose env file
        run: python -m tests.integration.helpers.compose_env

      - name: Validate test compose config
        run: docker compose -f docker-compose.test.yml config -q

      - name: Validate web stack compose config
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.microservices.yml \
            -f docker-compose.web.yml \
            --profile web \
            config -q

      - name: Validate E2E stack compose config
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.microservices.yml \
            -f docker-compose.web.yml \
            -f docker-compose.e2e.yml \
            --profile web \
            config -q

  e2e-resume-flow:
    name: E2E Resume Flow
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Skip on fork PRs — Docker compose builds are expensive and secrets are
    # unavailable on untrusted fork runs. The "require approval for outside
    # collaborators" repository setting (policy §25.6) is the outer gate;
    # this condition handles the internal case explicitly.
    # The CI Gate accepts "skipped" for this job only (see gate job below).
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass
      JOBSPY_API_TOKEN: jobscout-ci-internal-token
      JOBSCOUT_E2E_SKIP_BUILD: "1"

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Install uv
        # astral-sh/setup-uv v8.2.0 — verified 2026-06-21
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          version: "0.11.2"

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ensure compose env file
        run: uv run python -m tests.integration.helpers.compose_env

      - name: Prebuild E2E images
        run: |
          compose_args=(
            docker compose
            -p jobscout-e2e
            -f docker-compose.yml
            -f docker-compose.microservices.yml
            -f docker-compose.web.yml
            -f docker-compose.e2e.yml
            --profile web
          )
          services=(
            db-migrate
            mock-llm
            scorer-model-bootstrap
            notification-worker
            extraction
            embeddings
            scorer-matcher
            orchestrator
            web-backend
          )
          for service in "${services[@]}"; do
            echo "::group::Build ${service}"
            "${compose_args[@]}" --progress plain build --pull "${service}"
            echo "::endgroup::"
          done

      - name: Run E2E resume flow
        run: |
          uv run python -m pytest \
            tests/integration/test_microservices_resume_flow.py \
            -q

      - name: E2E compose diagnostics
        if: failure()
        run: |
          compose_args=(
            docker compose
            -p jobscout-e2e
            -f docker-compose.yml
            -f docker-compose.microservices.yml
            -f docker-compose.web.yml
            -f docker-compose.e2e.yml
            --profile web
          )
          "${compose_args[@]}" ps --format json || true
          "${compose_args[@]}" logs --no-color \
            db-migrate \
            notification-worker \
            web-backend \
            orchestrator \
            extraction \
            embeddings \
            scorer-matcher || true

  # ── CI Gate ───────────────────────────────────────────────────────────────
  # Stable-name gate job for required checks (policy §19.5).
  # Register "CI Gate" as the required check in branch protection.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [python-unit, python-security-concurrency, python-db-redis, python-performance, frontend-unit, integration, docker-compose-config, e2e-resume-flow]
    if: always()
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Evaluate CI job results
        env:
          PYTHON_UNIT:   ${{ needs.python-unit.result }}
          PYTHON_SECURITY_CONCURRENCY: ${{ needs.python-security-concurrency.result }}
          PYTHON_DB_REDIS: ${{ needs.python-db-redis.result }}
          PYTHON_PERFORMANCE: ${{ needs.python-performance.result }}
          FRONTEND_UNIT: ${{ needs.frontend-unit.result }}
          INTEGRATION:   ${{ needs.integration.result }}
          COMPOSE_CONFIG: ${{ needs.docker-compose-config.result }}
          E2E:           ${{ needs.e2e-resume-flow.result }}
        run: |
          FAILED=0

          # python-unit, frontend-unit, integration must always succeed.
          declare -A RESULTS=(
            [python-unit]="$PYTHON_UNIT"
            [python-security-concurrency]="$PYTHON_SECURITY_CONCURRENCY"
            [python-db-redis]="$PYTHON_DB_REDIS"
            [python-performance]="$PYTHON_PERFORMANCE"
            [frontend-unit]="$FRONTEND_UNIT"
            [integration]="$INTEGRATION"
            [docker-compose-config]="$COMPOSE_CONFIG"
          )
          for job in python-unit python-security-concurrency python-db-redis python-performance frontend-unit integration docker-compose-config; do
            result="${RESULTS[$job]}"
            if [[ "$result" != "success" ]]; then
              echo "::error::${job}: ${result} (expected: success)"
              FAILED=1
            fi
          done

          # e2e-resume-flow is intentionally skipped on fork PRs (resource + secret
          # constraint). "skipped" is the only acceptable non-success result here.
          if [[ "$E2E" == "skipped" ]]; then
            echo "e2e-resume-flow: skipped (expected on fork PRs)"
          elif [[ "$E2E" != "success" ]]; then
            echo "::error::e2e-resume-flow: ${E2E} (expected: success or skipped)"
            FAILED=1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more CI jobs failed or were not triggered as expected."
            exit 1
          fi
          echo "All CI jobs passed."
