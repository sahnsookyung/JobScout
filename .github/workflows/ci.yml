name: CI

on:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Python unit tests
        run: |
          uv run python -m pytest tests/ -q \
            -m "not db and not redis and not integration and not slow"

  frontend-unit:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: web/frontend
        env:
          CI: true
        run: npm run test -- --run

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run CI-safe integration suite
        run: |
          uv run python -m pytest \
            tests/integration/test_full_pipeline.py \
            tests/integration/test_resume_pipeline_lifecycle.py \
            tests/integration/test_user_wants_pipeline.py \
            tests/integration/services/test_services_lifespan.py \
            -q

  e2e-resume-flow:
    name: E2E Resume Flow
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: ${{ github.workspace }}
      JOBSCOUT_ENV: test
      AUTH_MODE: dev-bypass
      JOBSCOUT_E2E_SKIP_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ensure compose env file
        run: uv run python -m tests.integration.helpers.compose_env

      - name: Prebuild split-stack E2E images
        run: |
          compose_args=(
            docker compose
            -p jobscout-e2e
            -f docker-compose.yml
            -f docker-compose.microservices.yml
            -f docker-compose.web.yml
            -f docker-compose.e2e.yml
            --profile split
            --profile web
          )
          services=(
            db-migrate
            notification-worker
            extraction
            embeddings
            scorer-matcher
            orchestrator
            web-backend
          )
          for service in "${services[@]}"; do
            echo "::group::Build ${service}"
            "${compose_args[@]}" --progress plain build --pull "${service}"
            echo "::endgroup::"
          done

      - name: Run split-stack resume flow E2E
        run: |
          uv run python -m pytest \
            tests/integration/test_split_stack_resume_flow.py \
            -q

      - name: E2E compose diagnostics
        if: failure()
        run: |
          compose_args=(
            docker compose
            -p jobscout-e2e
            -f docker-compose.yml
            -f docker-compose.microservices.yml
            -f docker-compose.web.yml
            -f docker-compose.e2e.yml
            --profile split
            --profile web
          )
          "${compose_args[@]}" ps --format json || true
          "${compose_args[@]}" logs --no-color \
            db-migrate \
            notification-worker \
            web-backend \
            orchestrator \
            extraction \
            embeddings \
            scorer-matcher || true
