# ── Deploy Modal Embedding Server ─────────────────────────────────────────────
# Policy references: §9.2 (permissions: {}), §9.8 (persist-credentials: false),
#   §11.1 (SHA-pinned actions), §21 (concurrency + timeout),
#   §18.8 (pinned runtime package acquisition).
#
# modal is installed from a pinned version (policy §18.8 / §12.3 — no unpinned installs).
# Secrets (MODAL_TOKEN_ID, MODAL_TOKEN_SECRET) are scoped to the deploy job only.
# This workflow deploys only when modal/** changes on main (trusted source, policy §24.2).
#
# astral-sh/setup-uv exception note (policy §7.1, §7.4, §29):
#   This action is published by Astral (third party, not GitHub-maintained).
#   It installs the uv CLI; no GitHub-maintained or direct-CLI equivalent
#   exists for this setup step within GitHub Actions.
#   Compensating controls: action pinned to immutable commit SHA; uv binary
#   version also explicitly pinned via the `version:` input.
#   Exception must be reviewed quarterly (policy §31.3).
#   Action SHA: 22695119d769bdb6f7032ad67b9bca0ef8c4a174 — verified 2026-03-30
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Modal Embedding Server

on:
  push:
    branches: [main]
    paths:
      - "modal/**"
  workflow_dispatch:

# Workflow-level default: deny all (policy §9.2).
permissions: {}

concurrency:
  group: modal-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        # actions/checkout v7.0.0 — verified 2026-06-21
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v6.2.0 — verified 2026-03-30
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Install modal (pinned version)
        # Pinned to exact version — no floating installs (policy §12.3, §18.8).
        # NOTE: version not covered by Dependabot (inline pip install in run: block).
        #   Update manually when a new modal release is needed; review quarterly (policy §31.3).
        run: pip install "modal==1.4.0"

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID:     ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy modal/modal_server.py
