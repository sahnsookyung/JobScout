# Core Infrastructure
# Run: docker-compose -f docker-compose.yml --profile driver up -d

services:
  jobspy-service:
    image: sahnsookyung/jobspy:1.0.1
    platform: linux/amd64
    ports:
      - "8000:8000"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-jobscout}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-jobscout}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-jobscoutredis}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-jobscoutredis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=${REDIS_PASSWORD:-jobscoutredis} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  main-driver:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - jobspy-service
      - postgres
      - redis
    env_file:
      - .env
    environment:
      - JOBSPY_URL=http://jobspy-service:8000
      # Note: For production, use URL-encoded passwords or separate connection env vars
      # to avoid issues with special characters in passwords
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-jobscout}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-jobscoutredis}@redis:6379/0
    volumes:
      - ./resume.json:/app/resume.json
      - ./config.yaml:/app/config.yaml:ro
    profiles:
      - driver

volumes:
  postgres_data:
  redis_data:
