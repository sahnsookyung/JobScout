name: ${COMPOSE_PROJECT_NAME:-jobscout-test}

services:
  postgres-test:
    image: pgvector/pgvector:pg17
    container_name: ${JOBSCOUT_TEST_DB_CONTAINER_NAME:-jobscout-test-db}
    restart: "no"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: jobscout_test
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with local PostgreSQL
    volumes:
      - ./tests/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    tmpfs:
      - /var/lib/postgresql/data:size=512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d jobscout_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jobscout-test-network

networks:
  jobscout-test-network:
    name: ${JOBSCOUT_TEST_NETWORK_NAME:-jobscout-test-network}
    driver: bridge
