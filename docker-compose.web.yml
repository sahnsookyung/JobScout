# Web Services (Backend + Frontend)
# Run: docker compose -f docker-compose.yml -f docker-compose.pipeline.yml -f docker-compose.web.yml --profile web up -d
#
# Note: Pipeline services (extraction, embeddings, scorer-matcher, orchestrator)
# must be started separately or via the full stack command above.
# The backend handles connection failures gracefully with retries.

services:
  web-backend:
    build:
      context: ../..
      dockerfile: web/backend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-jobscout}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-jobscoutredis}@redis:6379/0
      - EXTRACTION_URL=http://extraction:8081
      - EMBEDDINGS_URL=http://embeddings:8082
      - SCORER_MATCHER_URL=http://scorer-matcher:8083
      - ORCHESTRATOR_URL=http://orchestrator:8084
    env_file:
      - .env
    volumes:
      - ../../config.yaml:/app/config.yaml:ro
    profiles:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web-frontend:
    build:
      context: ../..
      dockerfile: web/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - web-backend
    profiles:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
