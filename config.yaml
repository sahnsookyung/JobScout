database:
  # PostgreSQL connection (can be overridden by DATABASE_URL env var)
  url: "postgresql://user:password@localhost:5432/jobscout"

web:
  # Web dashboard server configuration
  host: "0.0.0.0"
  port: 8080  # Changed from 5000 to avoid conflicts

jobspy:
  # JobSpy scraping service URL (can be overridden by JOBSPY_URL env var)
  url: "http://localhost:8000" 

etl:
  # Resume processing configuration
  resume:
    # Note: Resume must be uploaded via the web UI. This config property is deprecated.
    # The system no longer uses a configured resume file - uploaded resumes are the only source of truth.
    # resume_file: "resume.pdf"  # DEPRECATED - removed
    # force_re_extraction: false  # Uncomment to force re-extraction every time
  llm:
    # Base URL for LLM (extraction) - can be overridden by ETL_LLM_BASE_URL env var
    # For local Ollama: http://localhost:11434/v1
    # For external services: https://api.openai.com/v1, https://your-ollama-host/v1, etc.
    base_url: "http://localhost:11434/v1"
    # API Key - can be overridden by ETL_LLM_API_KEY env var
    # For local Ollama: "ollama" (dummy key)
    # For external services: your actual API key
    api_key: "ollama"
    # API Secret (optional) - can be overridden by ETL_LLM_API_SECRET env var
    # For services that require both key and secret (e.g., some AWS, Azure configurations)
    # api_secret: "your-api-secret"
    
    # Extraction
    extraction_url: "" # Not used for Ollama/OpenAI
    extraction_type: "ollama" # Use "openai", "ollama" or "mock"
    extraction_model: "qwen3:14b"
    extraction_temperature: 0.5  # Temperature for extraction. 0.0 = "deterministic", but the results are not great. Research suggests we need a higher temperature than 0.
    
    # Embedding
    embedding_model: "qwen3-embedding:4b"
    embedding_dimensions: 1024 # Embedding Dimension: Up to 2560, supports user-defined output dimensions ranging from 32 to 2560 (https://huggingface.co/Qwen/Qwen3-Embedding-4B)
    # Separate embedding service (optional) - override with ETL_EMBEDDING_BASE_URL and ETL_EMBEDDING_API_KEY
    # embedding_base_url: "https://api.openai.com/v1"  # Uncomment and set for separate embedding endpoint
    # embedding_api_key: "your-api-key"  # Uncomment and set for separate embedding API key
    # embedding_api_secret: "your-api-secret"  # Uncomment and set for separate embedding API secret (optional)
    
    extraction_labels:
      - "programming_language"
      - "framework"
      - "tool"
      - "platform"
      - "skill"
      - "experience_years"
      - "education_degree"
      - "certification"
      - "responsibility"
      - "benefit"

matching:
  enabled: true
  # Mode: requirements_only (default).
  mode: "requirements_only"

  # Invalidation settings
  invalidate_on_job_change: true
  invalidate_on_resume_change: true
  recalculate_existing: true  # If true, recalculate matches even if they exist. Very important to set to false for performance improvements (job, resume, scoring parameters being the same means the score should be the same).
  
  # Stage 1: Matcher Service (Vector Retrieval)
  matcher:
    enabled: true
    similarity_threshold: 0.5
    batch_size: 100
    hybrid_retrieval_enabled: true
    lexical_limit: 100
    fusion_rank_constant: 60
    lexical_query_token_limit: 24
    # lexical_limit: 200          # Raise if dense-only retrieval misses exact skill/title matches
    # fusion_rank_constant: 40    # Lower values make top-ranked retrieval hits weigh more in fusion

  # Stage 2: Scorer Service (Rule-based Scoring)
  scorer:
    enabled: true
    semantic_fit:
      enabled: true
      deploy_allowed_modes: ["cross_encoder"]
      baseline_allowed_modes: ["cross_encoder"]
      default_mode: "cross_encoder"
      threshold_fallback_enabled: true
      recall_top_k: 5

      cross_encoder:
        route_policy: "local"
        remote_promote_pair_count: 40

        local:
          enabled: true
          runtime: "auto"
          model_name: "BAAI/bge-reranker-v2-m3"
          model_cache_path: null
          device_policy: "cpu"
          max_batch_size: 32
          max_concurrency: 1
          timeout_ms: 2000
          trust_remote_code: false

        remote:
          enabled: false
          base_url: null
          api_key: null
          model: "fit-cross-encoder-v1"
          timeout_ms: 1500
          max_batch_size: 64

      llm:
        enabled: false
        provider: "openai_compatible"
        base_url: null
        api_key: null
        api_secret: null
        headers: null
        model: "gpt-4o-mini"
        temperature: 0.0
        timeout_seconds: 20
        max_input_tokens: 4000

      serialization:
        requirement_text_max_chars: 500
        evidence_text_max_chars: 2500
        evidence_section_max_chars: 64
        job_title_max_chars: 200
        job_company_max_chars: 200
        job_summary_max_chars: 1800

      # recall_top_k: 8             # Raise for better recall, lower for lower latency/cost
      # cross_encoder:
      #   route_policy: "auto"      # Prefer remote in production when pair volume is high
      #   local:
      #     runtime: "flag_embedding"   # Prefer FlagEmbedding locally for multilingual reranking
      #     model_name: "BAAI/bge-reranker-v2-gemma"
      #     max_batch_size: 64      # Raise if CPU/memory allow larger batches
      #     timeout_ms: 4000        # Raise if long evidence/job contexts are common
      #     trust_remote_code: true # Needed by some local reranker models; leave false unless required
      #   remote:
      #     enabled: true           # Turn on remote scoring for production or larger pair volumes
      #     base_url: "https://fit.example.com"
      #     api_key: "..."
      # llm:
      #   enabled: true             # Advanced mode, intended for entitled users only
      # serialization:
      #   evidence_text_max_chars: 4000  # Raise if evidence is being truncated too aggressively
      #   # These are operating budgets, not hidden hard limits; truncation emits warnings/diagnostics.

    # Coverage weights (used in Fit score calculation)
    weight_required: 0.7
    weight_preferred: 0.3

    # Capability penalty amounts (Fit score only)
    penalty_missing_required: 15.0
    penalty_seniority_mismatch: 10.0
    penalty_compensation_mismatch: 10.0
    
    # User preferences (for display-time hard filters)
    wants_remote: true
    min_salary: null
    target_seniority: null

preferences:
  default_mode: "semantic_rerank"
  allowed_modes:
    - "semantic_rerank"
  parser:
    enabled: true
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
    model: "qwen3:14b"
    temperature: 0.0
    max_input_tokens: 1200
  semantic_reranker:
    enabled: true
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
    model: "qwen3:14b"
    temperature: 0.0
    max_input_tokens: 1200
  llm_judge:
    enabled: false
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
    model: "qwen3:14b"
    temperature: 0.0
    max_input_tokens: 1800


notifications:
  # Set to true to enable notifications (disabled by default)
  enabled: true

  # Base URL for links in notifications (e.g., to view matches in dashboard)
  base_url: "http://localhost:8080"  # Uses web.port from above

  # Unique user identifier for notifications
  # user_id: "your_user_id"

  # Only notify for matches above this score (0-100)
  min_score_threshold: 70.0

  # Priority thresholds for notifications (score 0-100)
  priority:
    high: 80  # Score >= 80 is HIGH priority
    normal: 60  # Score >= 60 is NORMAL priority
    low: 0  # Score < 60 is LOW priority
  
  # Notification triggers
  notify_on_new_match: true        # When a high-scoring match is found
  notify_on_batch_complete: true   # Summary after each matching batch
  
  # Custom notification channels - load external channel implementations
  # See docs/NOTIFICATIONS.md for details on creating custom channels
  # custom_channels:
  #   - name: "my_webhook"
  #     module: "my_package.channels"      # Python module path
  #     class: "CustomWebhookChannel"      # Class name in module
  
  # Notification channels (configure at least one)
  # Recipients are read from environment variables if not specified here
  channels:
    # email:
    #   enabled: true
    #   recipient: "your-email@example.com"  # Optional: overrides EMAIL env var
    #   # Requires: SMTP_SERVER, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
    
    discord:
      enabled: true
      recipient: ""  # Not used, set DISCORD_WEBHOOK_URL env var instead
      # Requires: DISCORD_WEBHOOK_URL
    
    # telegram:
    #   enabled: true
    #   recipient: "@your_channel_or_chat_id"  # Chat ID or @channelusername
    #   # Requires: TELEGRAM_BOT_TOKEN
    
    # webhook:
    #   enabled: true
    #   recipient: "https://your-webhook.com/endpoint"
    #   # No env vars required - URL specified here or in metadata
    
    # in_app:
    #   enabled: true
    #   # Logs only - for future dashboard integration
  
  # Deduplication prevents sending the same notification twice
  deduplication_enabled: true
  resend_interval_hours: 24
  
  # Async processing via Redis Queue
  use_async_queue: true
  # redis_url: "redis://localhost:6379/0"  # Optional: overrides REDIS_URL env var
  
  # Rate limiting: max seconds to wait when rate limited (5 minutes)
  rate_limit_max_wait_seconds: 300

schedule:
  interval_seconds: 3600  # Run every hour

scrapers:
  - site_type: ["tokyodev"]
    search_term: ""
    results_wanted: 5
    options:
      japanese_requirements: ["none"]
      seniorities: ["intern", "junior", "intermediate"]
      
  - site_type: ["japandev"]
    search_term: ""
    results_wanted: 5
    options:
      japanese_levels: ["japanese_level_not_required"]
      seniorities: ["seniority_level_junior", "seniority_level_mid_level"]
      applicant_locations: ["candidate_location_anywhere"]

  - site_type: ["indeed"]
    search_term: "software engineer"
    location: "Tokyo"
    country: "Japan"
    results_wanted: 5
    hours_old: 168 # 24 * 7
  
  - site_type: ["glassdoor"]
    search_term: "software engineer"
    location: "Tokyo"
    results_wanted: 5
    hours_old: 168
    request_timeout: 300 # 5 mins

  - site_type: ["linkedin"]
    search_term: "software engineer"
    location: "Tokyo"
    results_wanted: 5
    hours_old: 168
    linkedin_fetch_description: true
