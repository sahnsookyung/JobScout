# SonarQube Configuration for JobScout
# See: https://docs.sonarqube.org/latest/analysis/scan/sonarscanner/

# Project identification
sonar.projectKey=sahnsookyung_JobScout
sonar.projectName=JobScout
sonar.projectVersion=1.0.0
sonar.organization=sahnsookyung

# Source and test configuration
sonar.sources=services,core,database,etl,pipeline,notification,web,modal
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python-specific configuration
sonar.language=py
sonar.python.version=3.12,3.13

# Exclusions
sonar.exclusions=**/migrations/**,**/scripts/**,**/srs_tasks/**,**/__pycache__/**,**/*.pyc,**/.venv/**

# Test coverage - Cobertura XML format for SonarCloud
sonar.python.coverage.reportPaths=coverage.xml

# Exclude test files from duplications detection
sonar.cpd.exclusions=tests/**/*

# SCM configuration
sonar.scm.provider=git
