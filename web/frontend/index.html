<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F2EEE5" data-theme-color="true" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>JobScout</title>
    <script>
        // Apply saved theme before paint to avoid flash
        (function () {
            try {
                var saved = localStorage.getItem('jobscout-theme');
                var prefersDark = globalThis.matchMedia &&
                    globalThis.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = saved || (prefersDark ? 'dark' : 'light');
                document.documentElement.dataset.theme = theme;
                var themeColor = document.querySelector('meta[name="theme-color"][data-theme-color]');
                if (themeColor) {
                    themeColor.setAttribute('content', theme === 'dark' ? '#15130F' : '#F2EEE5');
                }
            } catch {
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" data-cfasync="false" src="/src/main.tsx"></script>
</body>

</html>
