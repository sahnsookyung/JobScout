# Compose overrides for deterministic E2E tests.

services:
  mock-llm:
    profiles: ["web"]
    build:
      context: .
      dockerfile: tests/services/mock_llm/Dockerfile
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web-backend:
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DEV_BYPASS_USER_ID=00000000-0000-0000-0000-000000000001
      - DEV_BYPASS_EMAIL=dev-user@jobscout.local
      - DEV_BYPASS_NAME=JobScout Dev User
      - RESUME_ETL_WAIT_TIMEOUT_SECONDS=${RESUME_ETL_WAIT_TIMEOUT_SECONDS:-90}
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key
      - PREFERENCES_PARSER_PROVIDER=openai_compatible
      - PREFERENCES_PARSER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_PARSER_API_KEY=mock-key
      - PREFERENCES_SEMANTIC_RERANKER_PROVIDER=openai_compatible
      - PREFERENCES_SEMANTIC_RERANKER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_SEMANTIC_RERANKER_API_KEY=mock-key
      - PREFERENCES_LLM_JUDGE_PROVIDER=openai_compatible
      - PREFERENCES_LLM_JUDGE_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_LLM_JUDGE_API_KEY=mock-key

  extraction:
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key

  embeddings:
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key

  # E2E uses PREFERENCES_CROSS_ENCODER_RUNTIME=heuristic (no real BGE weights
  # needed) and has no HF network/token, so the bootstrap step must be a no-op.
  # !reset clears the inherited build/volumes/env from microservices so compose
  # pulls busybox instead of trying to build a service that is not prebuilt.
  scorer-model-bootstrap:
    image: busybox:1.36
    build: !reset null
    entrypoint: ["/bin/sh", "-c"]
    command: ["echo '[bootstrap] skipped in E2E (heuristic runtime)' && exit 0"]
    volumes: !reset []
    environment: !reset []

  scorer-matcher:
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DEV_BYPASS_USER_ID=00000000-0000-0000-0000-000000000001
      - DEV_BYPASS_EMAIL=dev-user@jobscout.local
      - DEV_BYPASS_NAME=JobScout Dev User
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key
      - PREFERENCES_PARSER_PROVIDER=openai_compatible
      - PREFERENCES_PARSER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_PARSER_API_KEY=mock-key
      - PREFERENCES_SEMANTIC_RERANKER_PROVIDER=openai_compatible
      - PREFERENCES_SEMANTIC_RERANKER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_SEMANTIC_RERANKER_API_KEY=mock-key
      - PREFERENCES_LLM_JUDGE_PROVIDER=openai_compatible
      - PREFERENCES_LLM_JUDGE_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_LLM_JUDGE_API_KEY=mock-key
      - FIT_LLM_PROVIDER=openai_compatible
      - FIT_LLM_BASE_URL=http://mock-llm:8090/v1
      - FIT_LLM_API_KEY=mock-key
      - PREFERENCES_RERANKER=cross_encoder
      - PREFERENCES_CROSS_ENCODER_ENABLED=true
      - PREFERENCES_CROSS_ENCODER_RUNTIME=heuristic

  notification-worker:
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DEV_BYPASS_USER_ID=00000000-0000-0000-0000-000000000001
      - DEV_BYPASS_EMAIL=dev-user@jobscout.local
      - DEV_BYPASS_NAME=JobScout Dev User

  orchestrator:
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DISABLE_SCRAPER=1
      - LISTENER_TIMEOUT_SECONDS=${LISTENER_TIMEOUT_SECONDS:-90}
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
