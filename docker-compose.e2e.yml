# Compose overrides for deterministic E2E tests.

x-e2e-runtime-image: &e2e-runtime-image jobscout-e2e-runtime:latest

x-e2e-runtime: &e2e-runtime
  image: *e2e-runtime-image
  pull_policy: never

services:
  # Build one complete runtime for the E2E stack. The production Compose files
  # continue to build service-specific images; sharing here keeps Docker
  # Desktop's temporary export usage bounded while exercising the same code.
  db-migrate:
    image: *e2e-runtime-image
    env_file: !reset []
    build:
      context: .
      dockerfile: Dockerfile

  mock-llm:
    <<: *e2e-runtime
    build: !reset null
    profiles: ["web"]
    container_name: ${MOCK_LLM_CONTAINER_NAME:-jobscout-mock-llm}
    command: ["uvicorn", "tests.services.mock_llm.main:app", "--host", "0.0.0.0", "--port", "8090"]
    volumes:
      - ./tests:/app/tests:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web-backend:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["sh", "-c", "umask 0002 && exec uvicorn web.backend.app:app --host 0.0.0.0 --port 8080"]
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DEV_BYPASS_USER_ID=00000000-0000-0000-0000-000000000001
      - DEV_BYPASS_EMAIL=dev-user@jobscout.local
      - DEV_BYPASS_NAME=JobScout Dev User
      - RESUME_ETL_WAIT_TIMEOUT_SECONDS=${RESUME_ETL_WAIT_TIMEOUT_SECONDS:-90}
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key
      - PREFERENCES_PARSER_PROVIDER=openai_compatible
      - PREFERENCES_PARSER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_PARSER_API_KEY=mock-key
      - PREFERENCES_SEMANTIC_RERANKER_PROVIDER=openai_compatible
      - PREFERENCES_SEMANTIC_RERANKER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_SEMANTIC_RERANKER_API_KEY=mock-key
      - PREFERENCES_LLM_JUDGE_PROVIDER=openai_compatible
      - PREFERENCES_LLM_JUDGE_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_LLM_JUDGE_API_KEY=mock-key

  extraction:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["sh", "-c", "umask 0002 && exec uvicorn services.extraction.main:app --host 0.0.0.0 --port 8081"]
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key

  embeddings:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["uvicorn", "services.embeddings.main:app", "--host", "0.0.0.0", "--port", "8082"]
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key

  scorer-matcher:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["uvicorn", "services.scorer_matcher.main:app", "--host", "0.0.0.0", "--port", "8083"]
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DEV_BYPASS_USER_ID=00000000-0000-0000-0000-000000000001
      - DEV_BYPASS_EMAIL=dev-user@jobscout.local
      - DEV_BYPASS_NAME=JobScout Dev User
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key
      - PREFERENCES_PARSER_PROVIDER=openai_compatible
      - PREFERENCES_PARSER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_PARSER_API_KEY=mock-key
      - PREFERENCES_SEMANTIC_RERANKER_PROVIDER=openai_compatible
      - PREFERENCES_SEMANTIC_RERANKER_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_SEMANTIC_RERANKER_API_KEY=mock-key
      - PREFERENCES_LLM_JUDGE_PROVIDER=openai_compatible
      - PREFERENCES_LLM_JUDGE_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_LLM_JUDGE_API_KEY=mock-key
      - FIT_LLM_PROVIDER=openai_compatible
      - FIT_LLM_BASE_URL=http://mock-llm:8090/v1
      - FIT_LLM_API_KEY=mock-key
      - MATCHER_SKIP_WARMUP=true
      - PREFERENCES_RERANKER=cross_encoder
      - PREFERENCES_CROSS_ENCODER_ENABLED=true
      - PREFERENCES_CROSS_ENCODER_RUNTIME=heuristic

  scorer-model-bootstrap:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command:
      - python
      - -c
      - |
        from pathlib import Path

        cache_dir = Path("/home/appuser/.cache/huggingface")
        cache_dir.mkdir(parents=True, exist_ok=True)
        print("[bootstrap] skipped model download for E2E heuristic reranker", flush=True)

  notification-worker:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["python", "-m", "notification.worker"]
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DEV_BYPASS_USER_ID=00000000-0000-0000-0000-000000000001
      - DEV_BYPASS_EMAIL=dev-user@jobscout.local
      - DEV_BYPASS_NAME=JobScout Dev User

  llm-evaluation-worker:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["python", "-m", "core.llm_evaluation_worker"]
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - PREFERENCES_LLM_JUDGE_PROVIDER=openai_compatible
      - PREFERENCES_LLM_JUDGE_BASE_URL=http://mock-llm:8090/v1
      - PREFERENCES_LLM_JUDGE_API_KEY=mock-key

  orchestrator:
    <<: *e2e-runtime
    build: !reset null
    env_file: !reset []
    command: ["sh", "-c", "umask 0002 && exec uvicorn services.orchestrator.main:app --host 0.0.0.0 --port 8084"]
    depends_on:
      mock-llm:
        condition: service_healthy
    environment:
      - JOBSCOUT_ENV=test
      - AUTH_MODE=dev-bypass
      - DISABLE_SCRAPER=1
      - LISTENER_TIMEOUT_SECONDS=${LISTENER_TIMEOUT_SECONDS:-90}
      - ETL_LLM_PROVIDER=openai_compatible
      - ETL_LLM_EXTRACTION_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_EXTRACTION_API_KEY=mock-key
      - ETL_LLM_BASE_URL=http://mock-llm:8090/v1
      - ETL_LLM_API_KEY=mock-key
      - ETL_EMBEDDING_BASE_URL=http://mock-llm:8090/v1
      - ETL_EMBEDDING_API_KEY=mock-key
